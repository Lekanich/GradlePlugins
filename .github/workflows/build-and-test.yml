name: Build and Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch: # Allow manual triggers

jobs:
  build:
    name: Build and Test Plugins
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetch all history for proper versioning

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all plugins
        run: ./gradlew :git-tool:build --no-daemon --stacktrace

      - name: Run tests with coverage for git-tool
        run: ./gradlew :git-tool:test :git-tool:jacocoTestReport --no-daemon --stacktrace

      - name: Upload JaCoCo coverage report (git-tool)
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: jacoco-report-git-tool
          path: git-tool/build/reports/jacoco/test/html/
          retention-days: 30

      - name: Upload JaCoCo XML report (git-tool)
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: jacoco-xml-git-tool
          path: git-tool/build/reports/jacoco/test/jacocoTestReport.xml
          retention-days: 30

      - name: Upload test results (git-tool)
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results-git-tool
          path: git-tool/build/test-results/test/
          retention-days: 30

      - name: Generate coverage summary
        if: always()
        run: |
          if [ -f git-tool/build/reports/jacoco/test/html/index.html ]; then
            echo "### JaCoCo Coverage Report Available 📊" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Coverage reports have been generated and uploaded as artifacts." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Plugin:** git-tool" >> $GITHUB_STEP_SUMMARY
            echo "- Download the 'jacoco-report-git-tool' artifact to view the HTML report" >> $GITHUB_STEP_SUMMARY
            echo "- Download the 'jacoco-xml-git-tool' artifact for XML format" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📊 **JaCoCo Coverage Report**\n\nCoverage reports have been generated. Download the artifacts from the workflow run to view detailed coverage information.'
            })

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          check_name: Test Results
          detailed_summary: true
          include_passed: true
